<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <title>Ernest — Portfolio</title>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Ernest.</a>
        <nav>

    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Ernest — Profile Picture">
        </div>
        <div class="home-content">
            <h1>Hi, I'm <span>Ernest</span></h1>
            <h3 class="typing-text">I'm a <span></span></h3>

            <div class="social-icons">

    <script>
        // Sticky header background on scroll
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            header.style.background = window.scrollY > 20
                ? 'rgba(8,8,8,0.95)'
                : 'rgba(8,8,8,0.75)';
        });
    </script>
