    <script>
        // ── Typing animation ──────────────────────────────
        const words = ["Web Developer", "Developer", "Web Designer", "Photographer", "Videographer"];
        const el = document.getElementById('typed-text');
        let wi = 0, ci = 0, deleting = false;

        function type() {
            const word = words[wi];
            el.textContent = deleting ? word.slice(0, ci--) : word.slice(0, ci++);
            if (!deleting && ci > word.length) {
                deleting = true; setTimeout(type, 1800); return;
            }
            if (deleting && ci < 0) {
                deleting = false; wi = (wi + 1) % words.length; ci = 0;
                setTimeout(type, 400); return;
            }
            setTimeout(type, deleting ? 60 : 100);
        }
        type();

        // ── Header fade — throttled with rAF ─────────────
        const header = document.querySelector('header');
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    const ratio = Math.min(window.scrollY / 120, 1);
                    header.style.background = `rgba(8,8,8,${(0.15 + ratio * 0.82).toFixed(2)})`;
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });
    </script>
